# GCP VM 앞단 nginx 예시 — /quizpang 으로 Next(standalone) 프록시할 때
# 실제 도메인·인증서·upstream 포트에 맞게 수정하세요.
#
# 핵심: /api/ 는 캐시하지 않기 (누적 참여 수 등 JSON이 stale 되지 않게)

# map $sent_http_content_type $cacheable {
#   default 0;
# }

server {
    listen 443 ssl;
    server_name example.com;

    # ssl_certificate ...;

    location /quizpang/ {
        proxy_pass http://127.0.0.1:3000/quizpang/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API·동적 JSON은 캐시 금지 (nginx가 캐시 모듈 쓰는 경우)
        proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store" always;
    }

    # 또는 location 블록을 나누는 경우:
    # location /quizpang/api/ {
    #     proxy_pass http://127.0.0.1:3000/quizpang/api/;
    #     proxy_cache off;
    #     add_header Cache-Control "private, no-store, no-cache, must-revalidate" always;
    # }
}
